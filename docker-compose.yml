name: finansial

services: 
  auth_db:
    image: postgres:latest
    container_name: postgres-auth
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: finansial_auth_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d finansial_auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  transaction_db:
    image: postgres:latest
    container_name: postgres-transaction
    environment:
      POSTGRES_USER: ${TRANSACTION_DB_USER}
      POSTGRES_PASSWORD: ${TRANSACTION_DB_PASSWORD}
      POSTGRES_DB: finansial_transaction_db
    restart: unless-stopped
    ports:
      - "5434:5432"
    volumes:
      - postgres_transaction_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TRANSACTION_DB_USER} -d finansial_transaction_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  budget_db:
    image: postgres:latest
    container_name: postgres-budget
    environment:
      POSTGRES_USER: ${BUDGET_DB_USER}
      POSTGRES_PASSWORD: ${BUDGET_DB_PASSWORD}
      POSTGRES_DB: finansial_budget_db
    restart: unless-stopped
    ports:
      - "5435:5432"
    volumes:
      - postgres_budget_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BUDGET_DB_USER} -d finansial_budget_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai_db:
    image: postgres:latest
    container_name: postgres-ai
    environment:
      POSTGRES_USER: ${AI_DB_USER}
      POSTGRES_PASSWORD: ${AI_DB_PASSWORD}
      POSTGRES_DB: finansial_ai_db
    restart: unless-stopped
    ports:
      - "5436:5432"
    volumes:
      - postgres_ai_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AI_DB_USER} -d finansial_ai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification_db:
    image: postgres:latest
    container_name: postgres-notification
    environment:
      POSTGRES_USER: ${NOTIFICATION_DB_USER}
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
      POSTGRES_DB: finansial_notification_db
    restart: unless-stopped
    ports:
      - "5437:5432"
    volumes:
      - postgres_notification_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOTIFICATION_DB_USER} -d finansial_notification_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: financeapp_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: finansial_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: financeapp
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # zookeeper:
  #   image: confluentinc/cp-zookeeper:latest
  #   container_name: finansial_zookeeper
  #   restart: unless-stopped
  #   environment:
  #     ZOOKEEPER_CLIENT_PORT: 2181
  #     ZOOKEEPER_TICK_TIME: 2000
  #   volumes:
  #     - zookeeper_data:/var/lib/zookeeper/data
  #   healthcheck:
  #     test: ["CMD", "nc", "-z", "localhost", "2181"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: finansial_kafka
    restart: unless-stopped
    environment:
      # KRaft Required Roles
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      # Listeners Setup
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Pre-create our topics with sensible defaults
      KAFKA_CREATE_TOPICS: >
        transaction.created:1:1,
        budget.alert:1:1,
        ai.insight.ready:1:1,
        notification.send:1:1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  postgres_auth_data:
  postgres_transaction_data:
  postgres_budget_data:
  postgres_ai_data:
  postgres_notification_data:
  kafka_data:
  redis_data: